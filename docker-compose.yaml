services:
  dbservice:
    image: postgres:17-alpine
    container_name: postgres
    environment: 
      POSTGRES_DB: exauto_db
      POSTGRES_USER: exauto_app
      POSTGRES_PASSWORD: secretpassword
    ports: 
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_ready -U exauto_app -d exauto_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes: 
  pgdata:
    driver: local